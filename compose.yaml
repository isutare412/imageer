name: imageer

volumes:
  postgres-storage:
  kafka-data:

networks:
  app-tier:

services:
  postgres:
    image: postgres:18-trixie
    networks:
      app-tier:
    ports:
      - ${POSTGRES_PORT}:5432
    restart: unless-stopped
    volumes:
      - postgres-storage:/var/lib/postgresql
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_DB_NAME: ${APP_DB_NAME}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}

  valkey:
    image: valkey/valkey:9-trixie
    networks:
      app-tier:
    ports:
      - ${VALKEY_PORT}:6379
    restart: unless-stopped
    environment:
      # LINK: https://github.com/valkey-io/valkey/blob/9.0/valkey.conf
      VALKEY_EXTRA_FLAGS: "--bind * -::* --user admin on allcommands allkeys allchannels >complex_password --maxmemory 2gb --maxmemory-policy allkeys-lru"

  kafka:
    image: apache/kafka:4.2.0
    networks:
      app-tier:
    ports:
      - ${KAFKA_LOCAL_PORT}:9092
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: LOCAL://:9092,CONTROLLER://:9093,DOCKER://:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,LOCAL:SASL_PLAINTEXT,DOCKER:SASL_PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: LOCAL://localhost:${KAFKA_LOCAL_PORT},DOCKER://kafka:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: LOCAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENER_NAME_LOCAL_PLAIN_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="admin" password="${KAFKA_PASSWORD}"
        user_admin="${KAFKA_PASSWORD}";
      KAFKA_LISTENER_NAME_DOCKER_PLAIN_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="admin" password="${KAFKA_PASSWORD}"
        user_admin="${KAFKA_PASSWORD}";
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    networks:
      app-tier:
    ports:
      - ${KAFKA_UI_PORT}:8080
    restart: unless-stopped
    environment:
      KAFKA_CLUSTERS_0_NAME: home-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: PLAIN
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="admin" password="${KAFKA_PASSWORD}";
    depends_on:
      - kafka
